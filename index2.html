<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <!-- faz o site se adaptar ao celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site na Nuvem</title>

    <style>
        body {
            /* Cor de fundo em HEX */
            background-color: #f2f2f2;
            font-family: Arial;
            text-align: center;
            <!-- Remove margem padrão do navegador -->
            margin: 0;
            <!-- Remove espaçamento interno padrão -->
            padding: 0;
        }

        /* Caixa central (card) */
        .container {
            background-color: white;
            width: 80%;
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 10px;
            <!-- Sombra da caixa 0px → horizontal 4px → vertical 15px → desfoque 0.2 → transparência -->
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #333333;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Meu primeiro serviço na nuvem </h1>

        <p>Meu nome é William Gabriel</p>

        <p>Este site está hospedado na nuvem usando GitHub Pages.</p>
    </div>

</body>

</html>
