<!-- Define que o documento é HTML5
Diz ao navegador como interpretar o código -->
<!DOCTYPE html>

<!-- Início do documento HTML
Tudo do site fica dentro dessa tag -->
<html>

<!-- Cabeçalho do site
Contém configurações (Não aparece na página) -->
<head>
    
    <!-- Define a codificação de caracteres para aceitar acentos -->
    <meta charset="UTF-8">

    <!-- Título da aba do navegador -->
    <title>Meu Site na Nuvem</title>

        <!-- A tag <style> serve para colocar regras de aparência (CSS) dentro do HTML -->
    <style>
    body {
        /* Cor em código Hexa (0 a 9 e A até F) RGB #RRGGBB #ffffff = branco e #000000 = preto */
        background-color: #f2f2f2;
        font-family: Arial;
        text-align: center;
    }

    h1 {
        /* Nomes de cores: red, blue, green, black, white, darkblue... */
        color: darkblue;
    }
        
</style>
<!-- Fim do cabeçalho -->
</head>

<!-- Corpo do site
Tudo que aparece na tela fica aqui -->
<body>
    <!-- Título principal -->
    <h1>Meu primeiro serviço na nuvem</h1>

    <!-- Parágrafo. Nome do autor -->
    <p>Meu nome é William Gabriel</p>

    <!-- Parágrafo. Explicação do site -->
    <p>Este site está hospedado na nuvem usando GitHub Pages.</p>

<!-- Fim do conteúdo visível -->
</body>

<!-- Fim do documento HTML -->
</html>
